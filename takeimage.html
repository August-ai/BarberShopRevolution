<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon Photo Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="capture-page">
  <main class="capture-page-shell">
    <section class="capture-card">
      <div class="capture-header">
        <p class="capture-kicker">Salon Capture</p>
        <h1 class="capture-title">Capture Your Look</h1>
        <p class="capture-copy">Take a clear photo or upload one to start your salon preview.</p>
      </div>

      <section class="capture-stage" id="captureStage">
        <div class="capture-stage-frame">
          <p class="capture-helper">Best results come from a front-facing photo with clear lighting and the full face visible.</p>
          <div class="action-row">
            <button class="capture-button" id="openCameraButton" type="button">Take Image</button>
            <button class="secondary-button" id="openUploadButton" type="button">Upload</button>
          </div>
        </div>
      </section>

      <input
        class="file-input"
        id="capturePhotoInput"
        type="file"
        accept="image/*"
        capture="environment"
      >
      <input
        class="file-input"
        id="uploadPhotoInput"
        type="file"
        accept="image/*"
      >

      <section class="capture-preview-panel is-hidden" id="previewStep" aria-label="Captured photo preview" hidden>
        <img class="capture-preview-image" id="capturePreviewImage" alt="Captured salon portrait preview" hidden>
        <div class="capture-preview-actions" id="previewActionRow" hidden>
          <button class="capture-retake-button" id="retakeCaptureButton" type="button" hidden>Retake</button>
          <button class="capture-continue-button" id="continueToSalonButton" type="button" hidden>Continue</button>
        </div>
      </section>

      <p class="status-message" id="captureStatusMessage" aria-live="polite"></p>
    </section>
  </main>

  <script src="/takeimage.js"></script>
</body>
</html>
